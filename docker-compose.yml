services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini_website_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: mini_website
      DB_USER: mini_user
      DB_PASS: mini_password
    volumes:
      - ./:/var/www/html
      - uploads_data:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: mini_website_db
    restart: unless-stopped
    # Expose MySQL only internally; map externally if you need local SQL client access.
    # ports:
    #   - "3307:3306"
    environment:
      MYSQL_DATABASE: mini_website
      MYSQL_USER: mini_user
      MYSQL_PASSWORD: mini_password
      MYSQL_ROOT_PASSWORD: root
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
      - ./doc/create_test_user.sql:/docker-entrypoint-initdb.d/01-create_test_user.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db_data:
  uploads_data:
