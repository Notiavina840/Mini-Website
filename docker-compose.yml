services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini_website_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: mini_website
      DB_USER: mini_user
      DB_PASS: mini_password
    volumes:
      - ./:/var/www/html
      - ./uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: mini_website_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mini_website
      MYSQL_USER: mini_user
      MYSQL_PASSWORD: mini_password
      MYSQL_ROOT_PASSWORD: root
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mini_website_pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_USER: mini_user
      PMA_PASSWORD: mini_password
    ports:
      - "8081:80"

volumes:
  db_data:
